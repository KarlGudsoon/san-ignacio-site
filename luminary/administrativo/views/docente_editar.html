<button class="volver" id="volver">
  <img src="/assets/icon/arrow.svg" alt="" />
  Volver
</button>
<div class="header-dashboard">
  <div>
    <h2>Editar Docente</h2>
    <p>Completa la información del docente y guarda cambios.</p>
  </div>
</div>
<div class="contenedor-principal white" id="docente-contenido">
  <h3>Datos del Estudiante</h3>
  <div class="campo">
    <label>Nombre:</label>
    <input type="text" name="docente_nombre" required />
  </div>

  <div class="campo">
    <label>Correo:</label>
    <input type="text" name="docente_correo" required />
  </div>

  <div class="campo">
    <label>Contraseña:</label>
    <input type="password" name="docente_contrasena" />
  </div>

  <div class="campo">
    <label>Asignatura:</label>
    <input type="text" name="docente_asignatura" required />
  </div>

  <button class="btn-primario" id="guardar_editar_docente">
    Guardar Cambios
  </button>
</div>
